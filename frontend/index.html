<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siphon - Hexagonal Air Purifier Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            display: ['"Space Grotesk"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;900&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .hex-clip {
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    @keyframes airFlow {
      0% {
        transform: translateY(10%) scale(0.9);
        opacity: 0;
      }
      50% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-20%) scale(1.1);
        opacity: 0;
      }
    }

    .air-particle {
      animation: airFlow 4s infinite ease-in-out;
    }

    .particle-delayed {
      animation-delay: 2s;
    }

    .premium-shadow {
      box-shadow: 0 20px 40px -15px rgba(23, 23, 23, 0.05);
    }
  </style>
</head>
<body class="min-h-screen bg-[#F4F2EE] flex items-center justify-center p-4 antialiased selection:bg-[#ACE1A8]/40">

  <div class="w-full max-w-[410px] bg-[#FAF8F5] border border-neutral-200/80 rounded-[40px] shadow-2xl p-6 flex flex-col justify-between overflow-hidden relative premium-shadow min-h-[820px]">
    
    <div class="absolute top-2 left-1/2 -translate-x-1/2 w-32 h-4 bg-[#EAEAE8] rounded-full flex items-center justify-center opacity-60">
      <div class="w-12 h-1 bg-neutral-400 rounded-full"></div>
    </div>

    <header class="flex justify-between items-center pt-4 pb-3 border-b border-neutral-100 mb-5">
      <div class="flex items-center gap-2.5">
        <div class="w-10 h-10 bg-neutral-950 rounded-xl flex items-center justify-center text-[#ACE1A8] shadow-sm relative overflow-hidden">
          <div class="absolute inset-0 bg-[#ACE1A8]/10"></div>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative z-10"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
        </div>
        <div>
          <div class="flex items-center gap-1.5">
            <h1 class="text-base font-black text-neutral-950 tracking-tight uppercase font-display">Siphon</h1>
            <span class="text-[8px] font-mono font-black tracking-widest text-white bg-neutral-900 px-1.5 py-0.5 rounded-full">HEX-H13</span>
          </div>
          <p class="text-[10px] text-neutral-400 font-medium font-mono leading-none">AIR PURIFIER SYSTEM</p>
        </div>
      </div>

      <div class="flex items-center gap-2 bg-[#ACE1A8]/10 border border-[#ACE1A8]/30 px-3 py-1.5 rounded-full">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" id="live-dot"></span>
        <span class="text-[10px] font-bold text-emerald-800 font-mono tracking-wider uppercase" id="live-label">En Vivo</span>
      </div>
    </header>

    <main class="flex-1 flex flex-col justify-between space-y-6">
      
      <section class="flex flex-col items-center py-2 relative">
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
          <div class="air-particle absolute top-12 left-1/4 w-2.5 h-2.5 bg-[#ACE1A8]/40 rounded-full blur-[1px]"></div>
          <div class="air-particle particle-delayed absolute bottom-12 right-1/4 w-3.5 h-3.5 bg-[#ACE1A8]/20 rounded-full blur-[2px]"></div>
        </div>

        <div class="relative w-64 h-64 flex items-center justify-center">
          
          <div class="absolute inset-0 border border-neutral-200 rounded-[32px] rotate-12"></div>
          <div class="absolute inset-4 border border-dashed border-neutral-300/60 rounded-[28px] rotate-45"></div>

          <div class="w-48 h-48 bg-white border border-neutral-100 rounded-[24px] shadow-lg flex flex-col items-center justify-center p-1 relative overflow-hidden">
            
            <div class="absolute bottom-0 left-0 right-0 bg-[#ACE1A8]/15 border-t border-[#ACE1A8]/40 h-[64%]"></div>

            <div class="z-10 flex flex-col items-center justify-center text-center">
              <span class="text-[10px] font-mono font-bold text-neutral-400 uppercase tracking-widest leading-none mb-1.5">pH del Agua</span>
              
              <h2 class="text-4xl font-black text-neutral-950 font-display leading-none tracking-tight" id="main-value">7.0</h2>
              
              <p class="text-[10px] font-mono font-bold text-emerald-600 mt-1 uppercase bg-emerald-50 px-2 py-0.5 rounded-full" id="main-badge">Saludable</p>
            </div>

            <div class="absolute bottom-3 left-0 right-0 z-10 flex justify-center gap-4 text-[9px] font-mono text-neutral-400 font-bold uppercase">
              <span id="bottom-left">pH 7.0</span>
              <span>•</span>
              <span id="bottom-right">Estable</span>
            </div>
          </div>

          <div class="absolute top-4 left-6 w-3 h-3 rounded-full bg-emerald-400 border-2 border-white shadow" id="led-top"></div>
          <div class="absolute bottom-4 right-6 w-3 h-3 rounded-full bg-emerald-400 border-2 border-white shadow" id="led-bottom"></div>
        </div>
      </section>

      <section class="grid grid-cols-2 gap-4">
        
        <div class="bg-white border border-neutral-100 p-4 rounded-3xl shadow-sm flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-[9px] font-mono font-bold text-neutral-400 uppercase block">Temperatura</span>
              <h3 class="text-lg font-black text-neutral-950 font-display" id="temp-value">--<span class="text-[10px] text-neutral-400 font-mono">°C</span></h3>
            </div>
            <div class="p-1.5 bg-[#ACE1A8]/20 text-emerald-800 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
          </div>
          <div class="w-full bg-neutral-100 h-1.5 rounded-full overflow-hidden mt-3">
            <div class="bg-[#ACE1A8] h-full rounded-full" id="temp-bar" style="width: 50%;"></div>
          </div>
        </div>

        <div class="bg-white border border-neutral-100 p-4 rounded-3xl shadow-sm flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-[9px] font-mono font-bold text-neutral-400 uppercase block">Humedad</span>
              <h3 class="text-lg font-black text-neutral-950 font-display" id="hum-value">--<span class="text-[10px] text-neutral-400 font-mono">%</span></h3>
            </div>
            <div class="p-1.5 bg-[#ACE1A8]/20 text-emerald-800 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
            </div>
          </div>
          <div class="w-full bg-neutral-100 h-1.5 rounded-full overflow-hidden mt-3">
            <div class="bg-[#ACE1A8] h-full rounded-full" id="hum-bar" style="width: 50%;"></div>
          </div>
        </div>

        <div class="bg-white border border-neutral-100 p-4 rounded-3xl shadow-sm col-span-2 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-neutral-100 rounded-xl text-neutral-600" id="status-icon-box">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="status-svg"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0z"></path></svg>
            </div>
            <div>
              <span class="text-[9px] font-mono font-bold text-neutral-400 uppercase block">Estado del Sistema</span>
              <h4 class="text-sm font-bold text-neutral-800 font-mono" id="status-text">Saludable</h4>
            </div>
          </div>
          <div class="h-8 w-px bg-neutral-100"></div>
          <div class="flex items-center gap-3">
            <div class="p-2 bg-neutral-100 rounded-xl text-neutral-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"></path></svg>
            </div>
            <div>
              <span class="text-[9px] font-mono font-bold text-neutral-400 uppercase block">Última Lectura</span>
              <h4 class="text-sm font-bold text-neutral-800 font-mono" id="update-time">--:--</h4>
            </div>
          </div>
        </div>

      </section>

      <section class="space-y-3">
        <span class="text-[10px] font-mono font-bold text-neutral-400 uppercase tracking-wider block">Estado del pH</span>
        
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-neutral-950 text-[#ACE1A8] border border-neutral-950 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition" id="mode-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span class="text-[9px] font-bold uppercase font-mono">Saludable</span>
          </div>
          <div class="bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition" id="mode-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1.5"><path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10V2z"></path></svg>
            <span class="text-[9px] font-bold uppercase font-mono">Advertencia</span>
          </div>
          <div class="bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition" id="mode-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
            <span class="text-[9px] font-bold uppercase font-mono">Crítico</span>
          </div>
        </div>
      </section>

    </main>

    <footer class="mt-6 border-t border-neutral-100 pt-4 text-center">
      <div class="flex justify-between items-center text-[9px] font-mono text-neutral-400 font-bold uppercase tracking-wider">
        <span>MONITOREO IoT</span>
        <span>•</span>
        <span id="footer-ts">EN VIVO</span>
      </div>
    </footer>

  </div>

<script>
function mapData(d) {
  return {
    temperatura: d.temperature || 0,
    humedad: d.humidity || 0,
    ph: d.ph_estimate || 7,
    phStatus: d.ph_color_label || 'saludable',
    timestamp: d.timestamp || Math.floor(Date.now() / 1000)
  };
}

function updateUI(d) {
  const ph = d.ph || 7;
  const status = d.phStatus || 'saludable';

  document.getElementById('main-value').textContent = ph.toFixed(1);
  document.getElementById('main-badge').textContent = status === 'saludable' ? 'Saludable' : status === 'advertencia' ? 'Advertencia' : 'Crítico';
  document.getElementById('bottom-left').textContent = 'pH ' + ph.toFixed(1);

  if (status === 'saludable') {
    document.getElementById('bottom-right').textContent = 'Estable';
    document.getElementById('main-badge').className = 'text-[10px] font-mono font-bold text-emerald-600 mt-1 uppercase bg-emerald-50 px-2 py-0.5 rounded-full';
    document.getElementById('led-top').className = 'absolute top-4 left-6 w-3 h-3 rounded-full bg-emerald-400 border-2 border-white shadow';
    document.getElementById('led-bottom').className = 'absolute bottom-4 right-6 w-3 h-3 rounded-full bg-emerald-400 border-2 border-white shadow';
    document.getElementById('mode-1').className = 'bg-neutral-950 text-[#ACE1A8] border border-neutral-950 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-2').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-3').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('status-text').textContent = 'Saludable';
    document.getElementById('status-text').className = 'text-sm font-bold text-emerald-700 font-mono';
    document.getElementById('status-icon-box').className = 'p-2 bg-emerald-50 rounded-xl text-emerald-600';
  } else if (status === 'advertencia') {
    document.getElementById('bottom-right').textContent = 'Alerta';
    document.getElementById('main-badge').className = 'text-[10px] font-mono font-bold text-amber-600 mt-1 uppercase bg-amber-50 px-2 py-0.5 rounded-full';
    document.getElementById('led-top').className = 'absolute top-4 left-6 w-3 h-3 rounded-full bg-amber-400 border-2 border-white shadow';
    document.getElementById('led-bottom').className = 'absolute bottom-4 right-6 w-3 h-3 rounded-full bg-amber-400 border-2 border-white shadow';
    document.getElementById('mode-1').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-2').className = 'bg-neutral-950 text-[#ACE1A8] border border-neutral-950 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-3').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('status-text').textContent = 'Advertencia';
    document.getElementById('status-text').className = 'text-sm font-bold text-amber-700 font-mono';
    document.getElementById('status-icon-box').className = 'p-2 bg-amber-50 rounded-xl text-amber-600';
  } else {
    document.getElementById('bottom-right').textContent = 'Crítico';
    document.getElementById('main-badge').className = 'text-[10px] font-mono font-bold text-red-600 mt-1 uppercase bg-red-50 px-2 py-0.5 rounded-full';
    document.getElementById('led-top').className = 'absolute top-4 left-6 w-3 h-3 rounded-full bg-red-400 border-2 border-white shadow';
    document.getElementById('led-bottom').className = 'absolute bottom-4 right-6 w-3 h-3 rounded-full bg-red-400 border-2 border-white shadow';
    document.getElementById('mode-1').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-2').className = 'bg-white text-neutral-500 border border-neutral-100 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('mode-3').className = 'bg-neutral-950 text-[#ACE1A8] border border-neutral-950 p-2.5 rounded-2xl flex flex-col items-center justify-center text-center transition';
    document.getElementById('status-text').textContent = 'Crítico';
    document.getElementById('status-text').className = 'text-sm font-bold text-red-700 font-mono';
    document.getElementById('status-icon-box').className = 'p-2 bg-red-50 rounded-xl text-red-600';
  }

  document.getElementById('temp-value').innerHTML = (d.temperatura || 0).toFixed(1) + '<span class="text-[10px] text-neutral-400 font-mono">°C</span>';
  document.getElementById('hum-value').innerHTML = (d.humedad || 0).toFixed(0) + '<span class="text-[10px] text-neutral-400 font-mono">%</span>';

  const tempPct = Math.min((d.temperatura || 0) / 50, 1) * 100;
  const humPct = Math.min((d.humedad || 0) / 100, 1) * 100;
  document.getElementById('temp-bar').style.width = tempPct + '%';
  document.getElementById('hum-bar').style.width = humPct + '%';

  const ts = d.timestamp ? new Date(d.timestamp * 1000) : new Date();
  document.getElementById('update-time').textContent = ts.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('footer-ts').textContent = ts.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

async function fetchLatest() {
  try {
    const r = await fetch('/latest');
    const d = await r.json();
    if (d && d.temperature !== undefined) updateUI(mapData(d));
  } catch {}
}

fetchLatest();
setInterval(fetchLatest, 5000);
</script>
</body>
</html>
